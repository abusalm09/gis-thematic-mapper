[phases.setup]
nixPkgs = [
  "nodejs_22",
  "cairo",
  "pango",
  "libpng",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "pkg-config",
  "python3",
  "gdal",
]

[phases.install]
cmds = [
  "npm install -g pnpm@10.4.1",
  "export PATH=\"$(npm root -g)/.bin:$PATH\" && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "export PATH=\"$(npm root -g)/.bin:$PATH\" && pnpm build"
]

[start]
cmd = "node dist/index.js"
