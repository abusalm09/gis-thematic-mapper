# This file is kept for reference but Railway will use Dockerfile instead
# Railway auto-detects Dockerfile and uses it over nixpacks

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@latest && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "node dist/index.js"
